
<style>
.chart-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
.chart-sub { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 10px; }
.legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 8px; font-size: 11px; color: var(--color-text-secondary); }
.ld { width: 20px; height: 2px; display: inline-block; vertical-align: middle; margin-right: 5px; border-radius: 1px; }
</style>

<div style="padding: 1rem 0; max-width: 680px;">
  <div class="chart-title">Jain's Fairness Index (JFI)</div>
  <div class="chart-sub">grouped by client count · 10 / 20 / 30 clients</div>
  <div style="position:relative;height:300px;"><canvas id="c1"></canvas></div>
  <div class="legend">
    <span><span class="ld" style="background:#3266ad"></span>P-EDCA on both link</span>
    <span><span class="ld" style="background:#1D9E75"></span>P-EDCA on one link</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const sorted = {
  labels: ['1:9', '3:7', '5:5', '2:18', '6:14', '10:10', '3:27', '9:21', '15:15'],
  d0:     [0.959871, 0.961441, 0.962166, 0.844347, 0.859395, 0.848920, 0.856225, 0.798000, 0.813969],
  d1:     [0.959871, 0.865412, 0.865412, 0.851417, 0.890896, 0.854923, 0.858421, 0.801402, 0.723061]
};

const groupPlugin = {
  id: 'groupDividers',
  afterDraw(chart) {
    const { ctx, scales: { x, y } } = chart;
    [2.5, 5.5].forEach(pos => {
      const xPx = x.getPixelForValue(pos);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(xPx, y.top);
      ctx.lineTo(xPx, y.bottom);
      ctx.strokeStyle = 'rgba(136,135,128,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.restore();
    });
    [{ text: '10 clients', from: 0, to: 2 }, { text: '20 clients', from: 3, to: 5 }, { text: '30 clients', from: 6, to: 8 }].forEach(g => {
      const midX = (x.getPixelForValue(g.from) + x.getPixelForValue(g.to)) / 2;
      ctx.save();
      ctx.font = '11px sans-serif';
      ctx.fillStyle = 'rgba(136,135,128,0.65)';
      ctx.textAlign = 'center';
      ctx.fillText(g.text, midX, y.top - 6);
      ctx.restore();
    });
  }
};

new Chart(document.getElementById('c1'), {
  type: 'line',
  plugins: [groupPlugin],
  data: {
    labels: sorted.labels,
    datasets: [
      {
        label: 'P-EDCA on both link', data: sorted.d0,
        borderColor: '#3266ad', backgroundColor: 'rgba(50,102,173,0.08)',
        pointBackgroundColor: '#3266ad', pointRadius: 3, pointHoverRadius: 5,
        tension: 0.4, borderWidth: 2, fill: true
      },
      {
        label: 'P-EDCA on one link', data: sorted.d1,
        borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.08)',
        pointBackgroundColor: '#1D9E75', pointRadius: 3, pointHoverRadius: 5,
        tension: 0.4, borderWidth: 2, fill: true
      }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    layout: { padding: { top: 20 } },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(4)
        }
      }
    },
    scales: {
      x: { grid: { display: false }, ticks: { color: '#888780', font: { size: 10 }, autoSkip: false, maxRotation: 0 } },
      y: {
        grid: { color: 'rgba(136,135,128,0.12)' },
        ticks: { color: '#888780', font: { size: 10 }, callback: v => v.toFixed(2) },
        min: 0.65, max: 1.0
      }
    }
  }
});
</script>
